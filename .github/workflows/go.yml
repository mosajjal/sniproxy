name: Go

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v -race ./...

    - name: Goroutine leak detection
      run: GOEXPERIMENT=goroutineleakprofile go test -v -run "Goroutine" ./...
