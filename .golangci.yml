version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck      # Check for unchecked errors
    - govet         # Vet examines Go source code
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Static analysis (includes gosimple, unused)
    - misspell      # Check for misspelled words
    - goconst       # Find repeated strings that could be constants
    - unconvert     # Remove unnecessary type conversions
    - unparam       # Find unused function parameters
    - gosec         # Security-focused checks
  settings:
    errcheck:
      # type assertions are not checked yet; flip this on once the existing
      # unchecked assertions (mostly around DNS RR handling) are cleaned up
      check-type-assertions: false
      check-blank: false
    misspell:
      locale: US
  exclusions:
    rules:
      # Exclude some linters from running on tests files
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      - linters:
          - errcheck
        text: "Error return value of .*(Close|Shutdown) is not checked"

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
